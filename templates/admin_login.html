<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login – Rosie's</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
  --green: 17,122,63;
  --red: 220,38,38;
  --soft: 245,245,245;
  --font-heading: 'Playfair Display', serif;
  --font-body: 'Montserrat', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: linear-gradient(135deg,
    rgba(var(--green),0.9),
    rgba(var(--red),0.9)
  );
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* CARD */
.login-card {
  background: rgba(var(--soft), 0.95);
  backdrop-filter: blur(15px);
  border-radius: 24px;
  padding: 36px 32px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.25);
  border: 1px solid rgba(var(--green),0.2);
}

.login-header {
  text-align: center;
  margin-bottom: 28px;
}

.login-header img {
  width: 160px;
  margin-bottom: 10px;
}

.login-header h1 {
  font-family: var(--font-heading);
  font-size: 2rem;
  color: rgb(var(--green));
  margin-bottom: 6px;
}

.login-header p {
  font-size: 0.95rem;
  color: #555;
}

/* FORM */
.form-group {
  margin-bottom: 18px;
}

label {
  font-weight: 600;
  font-size: 0.9rem;
  margin-bottom: 6px;
  display: block;
}

input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid rgba(var(--green), 0.35);
  font-size: 0.95rem;
  outline: none;
  transition: 0.25s;
}

input:focus {
  border-color: rgb(var(--green));
  box-shadow: 0 0 0 3px rgba(var(--green), 0.15);
}

/* BUTTON */
.login-btn {
  width: 100%;
  padding: 14px;
  border-radius: 50px;
  border: none;
  background: linear-gradient(135deg,
    rgb(var(--green)),
    rgb(var(--red))
  );
  color: #fff;
  font-weight: 700;
  font-size: 0.95rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  cursor: pointer;
  margin-top: 10px;
  transition: 0.25s;
}

.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 15px 40px rgba(var(--green), 0.4);
}

/* FOOTER */
.login-footer {
  margin-top: 18px;
  text-align: center;
  font-size: 0.8rem;
  color: #666;
}
</style>
</head>
<body>

<div class="login-card">
  <div class="login-header">
    <img src="/static/images/rosies-logo.png" alt="Rosie's Logo">
    <h1>Admin Login</h1>
    <p>Secure access to Rosie’s dashboard</p>
  </div>

  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" required>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required>
    </div>

    <button type="submit" class="login-btn">
      <i class="fas fa-lock"></i> Login
    </button>
  </form>

  <div class="login-footer">
    <p>© Rosie's Kitchen — Admin Access Only</p>
  </div>
</div>

</body>
</html>
