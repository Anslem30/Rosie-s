<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password - African Delights</title>

<style>
    :root {
        --primary: #2c5f2d;
        --accent: #00a65a;
        --bg: #f4f6f8;
        --card: rgba(255, 255, 255, 0.92);
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        --border: rgba(0, 0, 0, 0.08);
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #f4f6f8 0%, #e8f2f1 100%);
    }

    .auth-container {
        max-width: 520px;
        margin: 4rem auto;
        background: var(--card);
        padding: 2.5rem;
        border-radius: 18px;
        box-shadow: var(--shadow);
        border: 1px solid var(--border);
        backdrop-filter: blur(10px);
    }

    .auth-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .auth-header h1 {
        margin: 0;
        color: var(--primary);
        letter-spacing: 1px;
    }

    .auth-header p {
        margin: 0.4rem 0 0;
        color: #666;
    }

    .form-group {
        margin-bottom: 1.2rem;
    }

    label {
        display: block;
        font-weight: 600;
        color: #444;
        margin-bottom: 0.5rem;
    }

    input {
        width: 100%;
        padding: 0.95rem 1rem;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.9);
        font-size: 1rem;
        transition: all 0.3s ease;
    }

    input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(0, 166, 90, 0.15);
    }

    .password-field {
        position: relative;
    }

    .toggle-password {
        position: absolute;
        right: 1rem;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1.2rem;
        color: #666;
    }

    .btn {
        width: 100%;
        padding: 1rem;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        font-weight: 700;
        font-size: 1rem;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        color: white;
        transition: transform 0.2s ease, filter 0.2s ease;
    }

    .btn:hover {
        filter: brightness(1.05);
        transform: translateY(-1px);
    }

    .auth-footer {
        text-align: center;
        margin-top: 1.5rem;
        color: #666;
    }

    .auth-footer a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 700;
    }

    .flash {
        padding: 0.9rem;
        border-radius: 10px;
        margin-bottom: 1rem;
        border: 1px solid var(--border);
    }

    .flash.error {
        background: #f8d7da;
        color: #721c24;
    }

    .flash.success {
        background: #d4edda;
        color: #155724;
    }

    .flash.info {
        background: #d1ecf1;
        color: #0c5460;
    }

    .password-strength {
        height: 6px;
        border-radius: 999px;
        background: rgba(0,0,0,0.08);
        overflow: hidden;
        margin-top: 0.6rem;
    }

    .password-strength-bar {
        height: 100%;
        width: 0%;
        transition: width 0.4s ease;
        border-radius: 999px;
    }

    .password-strength-bar.weak {
        width: 30%;
        background: #dc3545;
    }

    .password-strength-bar.medium {
        width: 60%;
        background: #ffc107;
    }

    .password-strength-bar.strong {
        width: 100%;
        background: #28a745;
    }

    small {
        display: block;
        margin-top: 0.4rem;
        color: #666;
    }

    @media (max-width: 600px) {
        .auth-container {
            margin: 2rem 1rem;
            padding: 2rem;
        }
    }
</style>
</head>

<body>

<div class="auth-container">

    <div class="auth-header">
        <h1>Change Password</h1>
        <p>Update your account securely</p>
    </div>

    <!-- FLASH MESSAGES -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('change_password') }}">

        <div class="form-group">
            <label>Email *</label>
            <input type="email" name="email" required>
        </div>

        <div class="form-group">
            <label>Current Password *</label>
            <div class="password-field">
                <input type="password" name="current_password" required>
                <button type="button" class="toggle-password" onclick="togglePassword('current_password')">👁️</button>
            </div>
        </div>

        <div class="form-group">
            <label>New Password *</label>
            <div class="password-field">
                <input type="password" id="new_password" name="new_password" minlength="6" required onkeyup="checkPasswordStrength()">
                <button type="button" class="toggle-password" onclick="togglePassword('new_password')">👁️</button>
            </div>
            <div class="password-strength">
                <div id="password-strength-bar" class="password-strength-bar"></div>
            </div>
            <small id="password-hint"></small>
        </div>

        <div class="form-group">
            <label>Confirm New Password *</label>
            <div class="password-field">
                <input type="password" name="confirm_password" minlength="6" required>
                <button type="button" class="toggle-password" onclick="togglePassword('confirm_password')">👁️</button>
            </div>
        </div>

        <button class="btn" type="submit">Change Password</button>
    </form>

    <div class="auth-footer">
        <p><a href="{{ url_for('user_login') }}">← Back to Login</a></p>
    </div>
</div>

<script>
    function togglePassword(name) {
        const field = document.getElementsByName(name)[0];
        field.type = field.type === "password" ? "text" : "password";
    }

    function checkPasswordStrength() {
        const password = document.getElementById('new_password').value;
        const bar = document.getElementById('password-strength-bar');
        const hint = document.getElementById('password-hint');

        let strength = 0;
        if (password.length >= 6) strength++;
        if (password.length >= 10) strength++;
        if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
        if (/\d/.test(password)) strength++;
        if (/[^a-zA-Z\d]/.test(password)) strength++;

        bar.className = 'password-strength-bar';

        if (!password) {
            hint.textContent = '';
        } else if (strength <= 2) {
            bar.classList.add('weak');
            hint.textContent = 'Weak password';
        } else if (strength <= 4) {
            bar.classList.add('medium');
            hint.textContent = 'Medium password';
        } else {
            bar.classList.add('strong');
            hint.textContent = 'Strong password';
        }
    }
</script>

</body>
</html>
